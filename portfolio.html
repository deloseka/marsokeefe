                    <div class="modal" onclick="this.style.display='none'">
                        <span class="portbutton">×</span>
                        <div class="modal-content">
                        <img class="inimage">
                        <p id="caption"></p>
                        </div>
                    </div>

        <script>
          /* Modal Image Gallery – class‑based version */
          function onClick(element) {
              // Grab the first element that matches the selector
              const img   = document.querySelector('.inimage');
              const modal = document.querySelector('.modal');

              if (img && modal) {
                  img.src = element.src;          // show the clicked picture
                  modal.style.display = 'block';  // make the overlay visible
                  const captionText = document.getElementById('caption');
                  if (captionText) captionText.innerHTML = element.alt;
              } else {
                  console.warn('Modal elements not found in the DOM.');
              }
          }
        </script>
